name: Run Playlist Script

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC diariamente
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.RUN_ACTIONS }}

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'

    - name: Run Movie Playlist PHP script
      run: php php/create_movie_playlist.php
      env:
        SECRET_API_KEY: ${{ secrets.SECRET_API_KEY }}

    - name: Run TV Playlist PHP script
      run: php php/create_tv_playlist.php
      env:
        SECRET_API_KEY: ${{ secrets.SECRET_API_KEY }}

    - name: Commit and Push
      run: |
        git config user.name "actions-user"
        git config user.email "actions@github.com"
        git add playlist.m3u8 playlist.json tv_playlist.json
        git commit -m "Update LATAM Playlists" || echo "No changes"
        git pull --rebase origin main || true
        git push https://x-access-token:${{ secrets.RUN_ACTIONS }}@github.com/raildozouk/numberone-vod-catalog.git
